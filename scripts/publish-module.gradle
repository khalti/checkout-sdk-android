// Load credentials from root local.properties into this subproject so vanniktech can find them
File secretPropsFile = rootProject.file('local.properties')
if (secretPropsFile.exists()) {
    Properties p = new Properties()
    new FileInputStream(secretPropsFile).withCloseable { is -> p.load(is) }
    ext["mavenCentralUsername"] = p.getProperty("mavenCentralUsername", "")
    ext["mavenCentralPassword"] = p.getProperty("mavenCentralPassword", "")
    ext["signingInMemoryKey"] = p.getProperty("signing.key", "")
    ext["signingInMemoryKeyId"] = p.getProperty("signing.keyId", "")
    ext["signingInMemoryKeyPassword"] = p.getProperty("signing.password", "")
} else {
    ext["mavenCentralUsername"] = System.getenv("MAVEN_CENTRAL_USERNAME") ?: ""
    ext["mavenCentralPassword"] = System.getenv("MAVEN_CENTRAL_PASSWORD") ?: ""
    ext["signingInMemoryKey"] = System.getenv("SIGNING_KEY") ?: ""
    ext["signingInMemoryKeyId"] = System.getenv("SIGNING_KEY_ID") ?: ""
    ext["signingInMemoryKeyPassword"] = System.getenv("SIGNING_PASSWORD") ?: ""
}

mavenPublishing {
    coordinates(PUBLISH_GROUP_ID, PUBLISH_ARTIFACT_ID, PUBLISH_VERSION)

    pom {
        name = PUBLISH_ARTIFACT_ID
        description = PUBLISH_DESCRIPTION
        url = PUBLISH_URL
        licenses {
            license {
                name = PUBLISH_LICENSE_NAME
                url = PUBLISH_LICENSE_URL
            }
        }
        developers {
            developer {
                id = PUBLISH_DEVELOPER_ID
                name = PUBLISH_DEVELOPER_NAME
                email = PUBLISH_DEVELOPER_EMAIL
            }
        }
        scm {
            connection = PUBLISH_SCM_CONNECTION
            developerConnection = PUBLISH_SCM_DEVELOPER_CONNECTION
            url = PUBLISH_SCM_URL
        }
    }
}
