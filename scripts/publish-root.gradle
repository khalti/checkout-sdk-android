// Credentials are loaded from local.properties in settings.gradle
// and injected as Gradle project properties available to all subprojects.
//
// For CI, set these environment variables instead of local.properties:
//   ORG_GRADLE_PROJECT_mavenCentralUsername
//   ORG_GRADLE_PROJECT_mavenCentralPassword
//   ORG_GRADLE_PROJECT_signingInMemoryKey       (base64 encoded secret key)
//   ORG_GRADLE_PROJECT_signingInMemoryKeyId
//   ORG_GRADLE_PROJECT_signingInMemoryKeyPassword
